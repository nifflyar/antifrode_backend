<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>RiskGuard — Вход</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
    rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .login-container {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 420px;
      padding: 40px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header i {
      font-size: 48px;
      color: #667eea;
      margin-bottom: 10px;
    }

    .login-header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a202c;
      margin: 10px 0 5px 0;
    }

    .login-header p {
      color: #718096;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #2d3748;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s;
      font-size: 14px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      color: #e53e3e;
      font-size: 13px;
      margin-top: 8px;
      padding: 10px;
      background: #fed7d7;
      border-radius: 6px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body class="antialiased">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <i class="fas fa-shield-alt"></i>
        <h1>RiskGuard</h1>
        <p>Платформа анализа рисков</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="admin@example.com" required>
        </div>

        <div class="form-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span id="btnText">Вход</span>
        </button>
      </form>

      <div style="text-align: center; margin-top: 20px; color: #718096; font-size: 13px;">
        <p>Для тестирования используйте:</p>
        <p style="font-family: monospace; color: #2d3748;">admin@example.com / AdminPassword123</p>
      </div>
    </div>
  </div>

  <script src="./js/api/apiClient.js?v=2"></script>
  <script src="./js/api/auth.js?v=2"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const errorMessage = document.getElementById('errorMessage');
    const loginBtn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showError('Пожалуйста, заполните все поля');
        return;
      }

      loginBtn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span>';

      try {
        const response = await apiClient.post('/api/auth/login', {
          email: email,
          password: password
        });

        if (response.success) {
          // Store auth status
          localStorage.setItem('isLoggedIn', 'true');
          localStorage.setItem('userEmail', email);

          // Redirect to dashboard
          window.location.href = '/index.html';
        } else {
          showError('Ошибка входа. Проверьте учетные данные.');
        }
      } catch (error) {
        console.error('Login error:', error);
        showError('Ошибка при входе. Проверьте email и пароль.');
      } finally {
        loginBtn.disabled = false;
        btnText.textContent = 'Вход';
      }
    });

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
      setTimeout(() => {
        errorMessage.classList.remove('show');
      }, 5000);
    }

    // Redirect to dashboard if already logged in
    if (localStorage.getItem('isLoggedIn') === 'true') {
      window.location.href = '/index.html';
    }
  </script>
</body>

</html>
