services:
  postgres:
    env_file:
      - .env
    image: postgres:16-alpine
    container_name: antifrode-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-antifrode_backend_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-antifrode_backend_db}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - antifrode-network

  app:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antifrode-api
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-antifrode_backend_db}
      CONFIG_PATH: /app/config.docker.yaml
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      # dev-режим (чтобы код обновлялся без пересборки)
      - ./app:/app/app
      - ./main.py:/app/main.py
      - ./config.docker.yaml:/app/config.docker.yaml:ro
      - ./alembic:/app/alembic
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8000/health/" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - antifrode-network

volumes:
  postgres_data:


networks:
  antifrode-network:

